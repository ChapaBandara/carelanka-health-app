name: carelanka_app
description: "CareLanka Phase 1 UI"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: any
  shared_preferences: ^2.5.3
  google_fonts: any
  intl: any
  fl_chart: any
  qr_flutter: any
  mobile_scanner: any
  image_picker: any
  pdf: any
  printing: any
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  flutter_local_notifications: any
  timezone: any
  emailjs: ^4.0.0
  http: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/drug_conflicts.json
    - assets/data/allergy_map.json
